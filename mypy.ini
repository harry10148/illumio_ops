[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_return_any = False
warn_unused_ignores = True
no_implicit_optional = True

[mypy-requests]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-cachetools]
ignore_missing_imports = True

[mypy-cachetools.*]
ignore_missing_imports = True

[mypy-urllib3.*]
ignore_missing_imports = True

[mypy-src.api_client]
disallow_untyped_defs = True

[mypy-src.analyzer]
disallow_untyped_defs = True

[mypy-src.reporter]
disallow_untyped_defs = True
