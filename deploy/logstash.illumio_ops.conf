input {
  file {
    path => "/opt/illumio-ops/logs/illumio_ops.json.log"
    codec => "json"
    sincedb_path => "/var/lib/logstash/sincedb_illumio_ops"
    start_position => "beginning"
    tags => ["illumio_ops"]
  }
}

filter {
  # Parse the loguru timestamp into @timestamp
  date {
    match => [ "[record][time][timestamp]", "UNIX" ]
    target => "@timestamp"
  }

  # Promote level name to top-level field for easier querying
  mutate {
    add_field => {
      "log_level"   => "%{[record][level][name]}"
      "log_message" => "%{[record][message]}"
      "log_module"  => "%{[record][name]}"
    }
    add_field => { "[@metadata][index]" => "illumio-ops" }
  }

  # Drop noisy debug entries if desired (comment out to keep all)
  if [log_level] == "DEBUG" {
    drop { }
  }
}

output {
  elasticsearch {
    hosts => ["elastic.example.com:9200"]
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
    # Uncomment for authenticated clusters:
    # user => "logstash_writer"
    # password => "changeme"
  }
  # Uncomment to also write to stdout for debugging:
  # stdout { codec => rubydebug }
}
