# report_config.yaml
# Illumio Traffic Flow Report — Configuration
# Generated by illumio_ops ModeA integration

# ─── Ransomware Risk Ports (Illumio Ransomware Protection Standard) ───────────
ransomware_risk_ports:
  critical:
    - {ports: [135],        proto: tcp,       service: RPC,        control: hard}
    - {ports: [445],        proto: tcp,       service: SMB,        control: hard}
    - {ports: [3389],       proto: [tcp,udp], service: RDP,        control: easy}
    - {ports: [5985, 5986], proto: tcp,       service: WinRM,      control: medium}
  high:
    - {ports: [5938],       proto: [tcp,udp], service: TeamViewer, control: easy}
    - {ports: [5900],       proto: [tcp,udp], service: VNC,        control: easy}
    - {ports: [137,138,139],proto: [udp,tcp], service: NetBIOS,    control: easy}
  medium:
    - {ports: [22],         proto: tcp,       service: SSH,        control: medium}
    - {ports: [2049],       proto: [tcp,udp], service: NFS,        control: medium}
    - {ports: [20, 21],     proto: [tcp,udp], service: FTP,        control: easy}
    - {ports: [5353],       proto: udp,       service: mDNS,       control: easy}
    - {ports: [5355],       proto: udp,       service: LLMNR,      control: easy}
    - {ports: [80],         proto: tcp,       service: HTTP,       control: easy}
    - {ports: [3702],       proto: udp,       service: WSD,        control: easy}
    - {ports: [1900],       proto: udp,       service: SSDP,       control: easy}
    - {ports: [23],         proto: tcp,       service: Telnet,     control: easy}
  low:
    - {ports: [110],        proto: [tcp,udp], service: POP3,       control: easy}
    - {ports: [1723],       proto: [tcp,udp], service: PPTP,       control: easy}
    - {ports: [111],        proto: tcp,       service: SunRPC,     control: easy}
    - {ports: [4444],       proto: [tcp,udp], service: Metasploit, control: easy}

# ─── Lateral Movement Ports (Module 5) ───────────────────────────────────────
lateral_movement_ports: [3389, 5900, 22, 445, 5985, 5986, 5938, 23]

# ─── Analysis Thresholds ─────────────────────────────────────────────────────
thresholds:
  # ── B-series (baseline rules) ────────────────────────────────────────────
  min_policy_coverage_pct: 30         # B005: alert if policy coverage < 30%
  lateral_movement_outbound_dst: 10   # B006: alert if unique dst > 10 on lateral ports
  user_destination_threshold: 20      # B007: alert if user reaches > 20 unique dst
  unmanaged_connection_threshold: 50  # B004: alert if unmanaged src conns > 50
  high_bytes_percentile: 95           # B008: anomaly if bytes > 95th percentile
  high_bandwidth_percentile: 95       # bandwidth spike percentile
  cross_env_connection_threshold: 100 # B009: cross-env flow volume alert

  # ── L-series (lateral movement rules) ────────────────────────────────────
  discovery_protocol_threshold: 10    # L002: min unblocked discovery flows to trigger
  db_unique_src_app_threshold: 5      # L003: alert if db reachable from > N source apps
  identity_unique_src_threshold: 3    # L005: alert if LDAP/Kerberos from > N source apps
  blast_radius_threshold: 5           # L006: alert if app can reach > N apps via lateral ports
  unmanaged_critical_threshold: 5     # L007: min flows from unmanaged to critical ports
  pb_lateral_threshold: 10            # L008: min PB flows on lateral ports to alert
  exfil_bytes_threshold_mb: 100       # L009: alert if managed→unmanaged transfer > N MB
  cross_env_lateral_threshold: 5      # L010: min cross-env lateral flows to alert

# ─── Report Output Settings ──────────────────────────────────────────────────
output:
  top_n: 20                # default rows per table
  include_raw_data: false  # include raw DataFrame sheet in Excel
  filename_prefix: "Illumio_Traffic_Report"
